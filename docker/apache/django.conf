<VirtualHost *:80>
    ServerName localhost
    WSGIScriptAlias / /app/capstone/wsgi.py
    Alias /static/ /app/staticfiles/
    <Directory /app/staticfiles>
        Require all granted
    </Directory>
    Alias /media/ /app/mediafiles/
    <Directory /app/mediafiles>
        Require all granted
    </Directory>
    <Directory /app/capstone>
        <Files wsgi.py>
            Require all granted
        </Files>
    </Directory>
    ErrorLog /var/log/apache2/django_error.log
    CustomLog /var/log/apache2/django_access.log combined
</VirtualHost>